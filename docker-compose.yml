services:
  ollama:
    image: ollama/ollama:0.3.12
    ports: ["11434:11434"]
    volumes: ["./ollama-models:/root/.ollama"]
    restart: unless-stopped

  fastapi:
    build: .
    ports: ["8000:8000"]
    depends_on: [ollama]
    env_file: .env
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
    restart: unless-stopped

  gradio:
    build: .
    command: python gradio_app.py
    ports: ["7860:7860"]
    depends_on: [fastapi]
    env_file: .env
    environment:
      - FASTAPI_URL=http://fastapi:8000/ask
    restart: unless-stopped

  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    ports: ["8080:8080"]
    depends_on: [ollama]
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
    restart: unless-stopped