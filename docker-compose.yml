services:
  ollama:
    image: ollama/ollama:0.3.12
    ports: ["11434:11434"]
    volumes: ["./ollama-models:/root/.ollama"]
    restart: unless-stopped

  ollama-model-puller:
    image: curlimages/curl:8.11.1
    container_name: ollama-model-puller
    depends_on:
      - ollama
    entrypoint: [ "/bin/sh", "-c" ]
    command: >
      "
      echo 'Waiting for Ollama to boot...';
      while ! curl -s http://ollama:11434/api/tags > /dev/null; do sleep 2; done;
      echo 'Pulling embedding model...';
      curl -X POST http://ollama:11434/api/pull -d '{\"name\": \"nomic-embed-text\"}';
      echo 'Pulling primary LLM...';
      curl -X POST http://ollama:11434/api/pull -d '{\"name\": \"llama3.2\"}';
      echo 'All models initialized permanently.';
      "

  fastapi:
    build: 
      context: .
      dockerfile: Dockerfile.fastapi
    ports: ["8000:8000"]
    depends_on: [ollama]
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
    restart: unless-stopped

  gradio:
    platform: linux/arm64
    image: ai-app-gradio
    environment:
      - CHROMA_TELEMETRY_ON=False
      - ANONYMIZED_TELEMETRY=False
    build: 
      context: .
      dockerfile: Dockerfile.gradio
    command: python gradio_app.py
    ports: ["7860:7860"]
    depends_on: 
      fastapi:
        condition: service_started
      ollama-model-puller:
        condition: service_completed_successfully
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 4G
    volumes:
      - ./data:/app/data
      - ./chroma_db:/app/chroma_db

  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    ports: ["8080:8080"]
    depends_on: [ollama]
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
    restart: unless-stopped
